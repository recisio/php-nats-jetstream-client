port: 4222
http_port: 8222
jetstream: true

# Standard NATS TLS: the server sends INFO in plaintext and the client upgrades to TLS
# afterwards (handshake_first is intentionally NOT set here). Exercises the post-INFO
# upgrade path used when NatsOptions::$tlsHandshakeFirst is false (the default).
tls {
  cert_file: "/etc/nats-certs/server-cert.pem"
  key_file: "/etc/nats-certs/server-key.pem"
  ca_file: "/etc/nats-certs/ca.pem"
  verify: true
}
