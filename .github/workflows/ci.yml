name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      integration-repeat-count:
        description: Number of repeated integration passes for the soak job
        required: false
        default: "2"

jobs:
  unit:
    name: Unit + Static (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The package targets php ^8.2 — verify unit + static analysis on every supported minor.
        php-version: ["8.2", "8.3", "8.4", "8.5"]
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: openssl, sodium, zlib, xdebug
      - uses: ramsey/composer-install@v3
      - name: Static Analysis
        run: composer stan
      - name: Unit Tests + Coverage Gate
        # Runs the unit suite with coverage and enforces a Docker-independent unit-only floor (95%) on
        # every supported PHP version. The combined unit+integration 97% floor is enforced in the e2e job.
        run: composer coverage:check:unit

  e2e:
    name: E2E + Coverage (PHP 8.5)
    runs-on: ubuntu-latest
    env:
      NATS_WAIT_TIMEOUT_SECONDS: "120"
      SKIP_JWT_FIXTURE_CHECK: true
      NATS_PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: openssl, sodium, zlib, xdebug
      - uses: ramsey/composer-install@v3
      - name: JWT Fixtures
        run: composer fixture:jwt
      - name: End-to-End Tests
        run: composer test:e2e
        env:
          KEEP_NATS_SERVICES: "1"
      - name: Generate Coverage Report
        # Combined unit + integration coverage (against the stack kept up above) so that
        # integration-only code (TLS upgrade, Object Store download, etc.) is counted.
        run: composer coverage:clover:all
      - name: Enforce Coverage Threshold
        # Reuses the clover report above (no extra test run); threshold is defined in composer.json
        # (coverage:check:clover) and fails the build below 97% (current combined coverage ~98.0%).
        run: composer coverage:check:clover
      - name: Stop NATS services
        if: always()
        run: docker compose down
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  examples:
    name: Examples (PHP 8.5)
    runs-on: ubuntu-latest
    env:
      NATS_WAIT_TIMEOUT_SECONDS: "120"
      NATS_PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: openssl, sodium, zlib
      - uses: ramsey/composer-install@v3
      - name: JWT Fixtures
        # Generates build/nats/jwt + .creds used by the auth-jwt-nkey / auth-credentials-file examples,
        # before the stack starts (so nats-jwt boots with the generated config) — same order as the e2e job.
        run: composer fixture:jwt
      - name: Start NATS services
        run: docker compose up -d
      - name: Wait for NATS services
        run: bash scripts/wait-for-nats-services.sh
      - name: Run examples (all must pass)
        # Every examples/*.php must run and pass. EXAMPLES_STRICT=1 makes a skipped example fail the job too,
        # so this gate guarantees all examples actually execute and succeed against the full dockerized stack.
        run: bash scripts/run-examples.sh
        env:
          NATS_URL: nats://127.0.0.1:14222
          EXAMPLES_STRICT: "1"
      - name: Stop NATS services
        if: always()
        run: docker compose down
